<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test Poc - Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    article { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    h2 { margin-top: 0; }
    .empty, .error { color: #888; }
  </style>
</head>
<body>
  <h1>Test Poc - contenuti pubblicati</h1>
  <div id="content">Caricamento...</div>
  <script>
    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    fetch('/api/test-pocs')
      .then((res) => res.json())
      .then((json) => {
        const container = document.getElementById('content');
        const entries = json.data || [];
        if (entries.length === 0) {
          container.innerHTML = '<p class="empty">Nessun contenuto pubblicato.</p>';
          return;
        }
        container.innerHTML = entries
          .map((entry) => {
            const { title, body } = entry.attributes ?? entry;
            return `<article><h2>${escapeHtml(title)}</h2><p>${escapeHtml(body)}</p></article>`;
          })
          .join('');
      })
      .catch((err) => {
        document.getElementById('content').innerHTML =
          '<p class="error">Errore nel caricamento: ' + escapeHtml(err.message) + '</p>';
      });
  </script>
</body>
</html>
